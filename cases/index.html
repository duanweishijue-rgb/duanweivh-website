<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>视觉锤案例 - 段位视觉锤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','HanHei SC','Helvetica Neue','Microsoft Yahei',sans-serif;color:#333;background:#fff;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}

/* ===== Nav (固定显示) ===== */
.nav{position:fixed;top:0;left:0;width:100%;height:60px;background:#fff;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:0 40px;border-bottom:1px solid #f0f0f0}
.nav-logo{font-size:18px;font-weight:700;color:#222;letter-spacing:1px}
.nav-logo span{font-weight:400;color:#999;font-size:14px;margin-left:4px}
.nav-links{display:flex;gap:0}
.nav-links a{color:#333;font-size:15px;padding:0 20px;height:60px;display:flex;align-items:center;transition:color .3s;font-weight:400}
.nav-links a:hover{color:#C5A258}
.nav-links a.active{color:#C5A258}

/* ===== Page Title ===== */
.page-title{margin-top:60px;padding:50px 40px 30px;text-align:center}
.page-title h1{font-size:32px;font-weight:400;color:#222;letter-spacing:2px}

/* ===== Cases Grid (三列网格) ===== */
.cases-grid{padding:0 40px 80px;display:grid;grid-template-columns:repeat(3,1fr);gap:30px;max-width:1400px;margin:0 auto}
.case-card{cursor:pointer;transition:transform .3s}
.case-card:hover{transform:translateY(-5px)}
.case-card-img{width:100%;aspect-ratio:4/3;background-size:cover;background-position:center;margin-bottom:15px;transition:transform .5s ease}
.case-card:hover .case-card-img{transform:scale(1.02)}
.case-card:nth-child(1) .case-card-img{background:linear-gradient(135deg,#C5A258,#D4AF37)}
.case-card:nth-child(2) .case-card-img{background:linear-gradient(135deg,#5D4037,#3C2415)}
.case-card:nth-child(3) .case-card-img{background:linear-gradient(135deg,#FFD700,#C5A258)}
.case-card:nth-child(4) .case-card-img{background:linear-gradient(135deg,#D4AF37,#5D4037)}
.case-card:nth-child(5) .case-card-img{background:linear-gradient(135deg,#3C2415,#C5A258)}
.case-card:nth-child(6) .case-card-img{background:linear-gradient(135deg,#C5A258,#5D4037)}
.case-placeholder{display:flex;align-items:center;justify-content:center;aspect-ratio:4/3;font-size:60px;opacity:.12}
.case-card-info h3{font-size:18px;font-weight:500;color:#222;margin-bottom:8px;letter-spacing:1px}
.case-card-info .tag{font-size:12px;color:#999;letter-spacing:1px}

/* ===== Footer ===== */
.footer{background:#f5f5f5;padding:20px 40px;border-top:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:12px;color:#999;transition:color .3s}
.footer-links a:hover{color:#333}
.footer-copy{font-size:11px;color:#bbb}

/* ===== Mobile ===== */
@media(max-width:768px){
.nav{height:50px;padding:0 16px}
.nav-logo{font-size:15px}
.nav-logo span{font-size:12px}
.nav-links a{padding:0 12px;font-size:13px;height:50px}
.page-title{margin-top:50px;padding:35px 16px 25px}
.page-title h1{font-size:24px}
.cases-grid{padding:0 16px 50px;grid-template-columns:1fr;gap:25px}
.case-card-img,.case-placeholder{aspect-ratio:4/3}
.case-card-info h3{font-size:16px}
.footer{padding:15px 16px;flex-direction:column;gap:10px;text-align:center}
}
</style>
</head>
