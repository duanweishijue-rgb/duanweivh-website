<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#2C1810">
<title>艾红象艾灸 - 段位视觉锤案例</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brown:#2C1810;--brown2:#3C2415;--brown3:#5D4037;--gold:#C5A258;--gold2:#D4AF37;--cream:#F5F0E8;--white:#fff}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;color:var(--brown);background:var(--cream);line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 2rem}

/* Header (深咖色背景) */
.header{background:var(--brown);position:fixed;width:100%;top:0;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.header .container{display:flex;justify-content:space-between;align-items:center;height:60px}
.logo{color:var(--gold);font-size:1.5rem;font-weight:700;letter-spacing:2px}
.nav{display:flex;gap:1.5rem}
.nav a{color:var(--white);font-size:.9rem;padding:.5rem 0;transition:color .3s}
.nav a:hover{color:var(--gold)}

/* Page Hero */
.page-hero{margin-top:60px;padding:60px 0;background:var(--white);text-align:center}
.page-hero .tag{display:inline-block;background:var(--gold);color:var(--white);font-size:13px;padding:4px 16px;border-radius:20px;margin-bottom:15px}
.page-hero h1{font-size:32px;color:var(--brown);font-weight:700;letter-spacing:2px;margin-bottom:10px}
.page-hero .industry{font-size:16px;color:var(--gold);letter-spacing:1px}

/* Case Cover */
.case-cover{width:100%;height:400px;background:linear-gradient(135deg,#D4AF37,#5D4037);display:flex;align-items:center;justify-content:center;position:relative}
.case-cover-text{color:var(--white);font-size:48px;font-weight:700;opacity:.3;letter-spacing:5px}

/* Case Info */
.case-info{padding:60px 0}
.case-info-grid{display:flex;gap:40px;margin-bottom:40px}
.case-info-main{flex:2}
.case-info-side{flex:1}
.case-info h2{font-size:24px;color:var(--brown);font-weight:700;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid var(--gold)}
.case-info p{font-size:15px;color:#666;line-height:2;margin-bottom:15px}
.case-info .info-card{background:var(--white);border-radius:12px;padding:25px;box-shadow:0 2px 15px rgba(0,0,0,.05);margin-bottom:20px}
.case-info .info-card h4{font-size:16px;color:var(--brown);font-weight:600;margin-bottom:10px}
.case-info .info-card .value{font-size:14px;color:#888}

/* Gallery */
.gallery{padding:40px 0 60px}
.gallery h2{font-size:24px;color:var(--brown);font-weight:700;margin-bottom:30px;text-align:center}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.gallery-item{background:var(--white);border-radius:12px;overflow:hidden;box-shadow:0 2px 15px rgba(0,0,0,.05)}
.gallery-item-img{width:100%;height:280px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#aaa}
.gallery-item-img:nth-child(1){background:linear-gradient(135deg,#f5f0e8,#e8dfd0)}
.gallery-item:nth-child(1) .gallery-item-img{background:linear-gradient(135deg,#f5f0e8,#e8dfd0)}
.gallery-item:nth-child(2) .gallery-item-img{background:linear-gradient(135deg,#e8dfd0,#d4c5a9)}
.gallery-item:nth-child(3) .gallery-item-img{background:linear-gradient(135deg,#d4c5a9,#c5b899)}
.gallery-item:nth-child(4) .gallery-item-img{background:linear-gradient(135deg,#f0ebe0,#e0d5c0)}
.gallery-item-label{padding:15px 20px;font-size:14px;color:var(--brown);font-weight:500}

/* Footer */
.footer{background:var(--brown);color:rgba(255,255,255,.5);padding:40px 0 20px}
.footer-brand{text-align:center;margin-bottom:20px}
.footer-brand .name{color:var(--gold);font-size:22px;font-weight:700;letter-spacing:2px;display:block}
.footer-brand .desc{color:rgba(255,255,255,.5);font-size:13px;margin-top:5px}
.footer-nav{display:flex;justify-content:center;gap:2rem;margin-bottom:20px}
.footer-nav a{color:rgba(255,255,255,.7);font-size:14px;transition:color .3s}
.footer-nav a:hover{color:var(--gold)}
.footer-copy{text-align:center;font-size:12px;opacity:.4;padding-top:15px;border-top:1px solid rgba(255,255,255,.1)}

@media(max-width:768px){
.header .container{height:50px;padding:0 1rem}
.logo{font-size:1.2rem}
.nav{gap:1rem}
.nav a{font-size:.75rem}
.page-hero{padding:40px 0}
.page-hero h1{font-size:24px}
.case-cover{height:250px}
.case-cover-text{font-size:28px}
.case-info-grid{flex-direction:column;gap:20px}
.gallery-grid{grid-template-columns:1fr}
.gallery-item-img{height:200px}
}
</style>
</head>
<body>

<header class="header">
<div class="container">
<div class="logo">段位视觉锤</div>
<nav class="nav">
<a href="/">首页</a>
<a href="/cases/index.html">视觉锤案例</a>
<a href="/about.html">关于我们</a>
<a href="/contact.html">联系我们</a>

</div>

<div class="page-hero">
<span class="tag">养生保健</span>
<h1>艾红象艾灸</h1>
<div class="industry">艾灸养生品牌</div>
</div>

<div class="case-cover">
<div class="case-cover-text">艾红象</div>
</div>

<section class="case-info">
<div class="container">
<div class="case-info-grid">
<div class="case-info-main">
<h2>案例介绍</h2>
<p>艾红象艾灸是艾灸养生领域的品牌。以大象为视觉锤，结合艾草元素，打造艾灸品类的强势品牌识别。</p>
<p>通过系统化的视觉锤策略，将大象的稳重感与艾灸的养生理念相结合，创造出独特且易记的品牌视觉形象。</p>
</div>
<div class="case-info-side">
<div class="info-card"><h4>品牌名称</h4><div class="value">艾红象艾灸</div></div>
<div class="info-card"><h4>所属行业</h4><div class="value">养生保健</div></div>
<div class="info-card"><h4>服务项目</h4><div class="value">品牌视觉锤全案</div></div>
</div>
</div>
</div>

<section class="gallery">
<div class="container">

<div class="gallery-grid">
<div class="gallery-item"><div class="gallery-item-img">Logo设计</div><div class="gallery-item-label">品牌Logo设计</div></div>
<div class="gallery-item"><div class="gallery-item-img">包装设计</div><div class="gallery-item-label">产品包装设计</div></div>
<div class="gallery-item"><div class="gallery-item-img">应用设计</div><div class="gallery-item-label">品牌应用设计</div></div>
<div class="gallery-item"><div class="gallery-item-img">效果展示</div><div class="gallery-item-label">终端效果展示</div></div>
</div>
</div>
</section>

<footer class="footer">
<div class="container">
<div class="footer-brand"><span class="name">段位视觉锤</span><span class="desc">品牌视觉战略咨询专家</span></div>
<div class="footer-nav"><a href="/">首页</a><a href="/cases/index.html">视觉锤案例</a><a href="/about.html">关于我们</a><a href="/contact.html">联系我们</a></div>
<div class="footer-copy">&copy; 2024 段位视觉锤 版权所有</div>
</div>
</footer>

</body>
</html>
