<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#2C1810">
<title>彭世修脚 - 段位视觉锤案例</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brown:#2C1810;--brown2:#3C2415;--brown3:#5D4037;--gold:#C5A258;--gold2:#D4AF37;--cream:#F5F0E8;--white:#fff}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;color:var(--brown);background:var(--white);line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 2rem}

/* Header (深咖色背景) */
.header{background:var(--white);position:fixed;width:100%;top:0;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.header .container{display:flex;justify-content:space-between;align-items:center;height:110px}
.logo{height:80px;width:auto}
.nav{display:flex;gap:1.5rem}
.nav a{color:var(--brown);font-size:1.35rem;padding:.5rem 0;transition:color .3s}
.nav a:hover{color:var(--gold)}

/* Hamburger Menu - 仅移动端显示 */
.hamburger{display:none;flex-direction:column;cursor:pointer;gap:5px}
.hamburger span{width:25px;height:3px;background:var(--brown);border-radius:2px;transition:all .3s}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(7px,-6px)}


/* Full Screen Long Image - 全屏长图 */
.case-long-image{margin-top:110px;width:100%;min-height:calc(100vh - 110px);background:linear-gradient(135deg,var(--brown) 0%,var(--brown2) 50%,var(--gold) 100%);display:flex;align-items:center;justify-content:center;position:relative}
.case-long-image::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><rect fill="%232C1810" width="1920" height="1080"/><text x="960" y="540" font-family="Arial" font-size="180" fill="%23C5A258" opacity="0.1" text-anchor="middle" dominant-baseline="middle">CASE IMAGE</text></svg>') center/cover no-repeat}
.long-image-placeholder{color:var(--white);font-size:48px;font-weight:900;letter-spacing:8px;text-shadow:0 4px 30px rgba(0,0,0,.4);z-index:1;text-align:center}
.long-image-placeholder small{display:block;font-size:18px;font-weight:400;opacity:.7;margin-top:15px;letter-spacing:2px}
.case-long-image>img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0}

/* Footer */
.footer{background:var(--brown);color:rgba(255,255,255,.5);padding:60px 0 30px}
.footer-brand{text-align:center;margin-bottom:30px}
.footer-brand .name{color:var(--gold);font-size:33px;font-weight:700;letter-spacing:2px;display:block}
.footer-brand .desc{color:rgba(255,255,255,.5);font-size:19.5px;margin-top:7.5px}
.footer-nav{display:flex;justify-content:center;gap:2rem;margin-bottom:30px}
.footer-nav a{color:rgba(255,255,255,.7);font-size:21px;transition:color .3s}
.footer-nav a:hover{color:var(--gold)}
.footer-copy{text-align:center;font-size:18px;opacity:.4;padding-top:22.5px;border-top:1px solid rgba(255,255,255,.1)}

@media(max-width:768px){
.header .container{height:80px;padding:0 1rem}
.logo{height:55px;width:auto}
.nav{position:fixed;top:80px;left:-100%;width:100%;height:calc(100vh - 80px);background:var(--brown);flex-direction:column;align-items:center;justify-content:flex-start;padding-top:40px;gap:2rem;transition:left .3s ease}
.nav.active{left:0}
.nav a{font-size:1.2rem;color:var(--white);padding:1rem 2rem;border-bottom:1px solid rgba(255,255,255,.1);width:100%;text-align:center}
.hamburger{display:flex}
.case-long-image{min-height:calc(100vh - 80px)}
.long-image-placeholder{font-size:24px;letter-spacing:3px;line-height:1.5}
.long-image-placeholder small{font-size:14px;margin-top:10px}
.case-long-image{min-height:calc(100vh - 80px)}
.long-image-placeholder{font-size:24px;letter-spacing:3px;line-height:1.5}
.long-image-placeholder small{font-size:14px;margin-top:10px}
.footer-nav{flex-wrap:wrap;gap:1.5rem}
}
</style>
</head>
<body>

<header class="header">
<div class="container">
<img class="logo" src="../images/logo/logo.jpg" alt="段位超级视觉">
<div class="hamburger" id="hamburger">
<span></span>
<span></span>
<span></span>
</div>
<nav class="nav" id="nav">
<a href="../">首页</a>
<a href="./index.html">视觉锤案例</a>
<a href="../about.html">关于我们</a>
<a href="../contact.html">联系我们</a>
</nav>
</div>
</header>

<!-- Full Screen Long Image -->
<div class="case-long-image">
<img src="../images/detail/pengshi.jpg" alt="彭世修脚">
<div class="long-image-placeholder">
彭世修脚<br>
<small>品牌案例长图展示区</small>
</div>
</div>

<footer class="footer">
<div class="container">
<div class="footer-brand"><span class="name">段位视觉锤</span><span class="desc">品牌视觉战略咨询专家</span></div>
<div class="footer-nav"><a href="../">首页</a><a href="./index.html">视觉锤案例</a><a href="../about.html">关于我们</a><a href="../contact.html">联系我们</a></div>
<div class="footer-copy">&copy; 2024 段位视觉锤 版权所有</div>
</div>
</footer>



<script>
// Hamburger Menu
document.getElementById('hamburger').addEventListener('click',function(){
  this.classList.toggle('active');
  document.getElementById('nav').classList.toggle('active');
});

// Close menu when clicking a link
document.querySelectorAll('.nav a').forEach(function(link){
  link.addEventListener('click',function(){
    document.getElementById('hamburger').classList.remove('active');
    document.getElementById('nav').classList.remove('active');
  });
});
</script>

</body>
</html>
