<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#2C1810">
<title>联系我们 - 段位视觉锤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brown:#2C1810;--brown2:#3C2415;--brown3:#5D4037;--gold:#C5A258;--gold2:#D4AF37;--cream:#F5F0E8;--white:#fff;--gray:#f8f6f3}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;color:var(--brown);background:var(--cream);line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}
.container{max-width:1200px;margin:0 auto;padding:0 2rem}

/* Header (深咖色背景) */
.header{background:var(--brown);position:fixed;width:100%;top:0;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.header .container{display:flex;justify-content:space-between;align-items:center;height:60px}
.logo{color:var(--gold);font-size:1.5rem;font-weight:700;letter-spacing:2px}
.nav{display:flex;gap:1.5rem}
.nav a{color:var(--white);font-size:.9rem;padding:.5rem 0;transition:color .3s}
.nav a:hover{color:var(--gold)}

/* Page Hero 尺寸：宽100% 高300px */
.page-hero{margin-top:60px;padding:60px 0;background:var(--white);text-align:center}
.page-hero .en{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:4px;margin-bottom:10px;display:block}
.page-hero h1{font-size:32px;color:var(--brown);font-weight:700;letter-spacing:2px;margin-bottom:15px}
.page-hero .divider{width:40px;height:2px;background:var(--gold);margin:0 auto 20px}
.page-hero p{font-size:15px;color:#888;max-width:600px;margin:0 auto;line-height:1.8}

/* Contact Section 尺寸：宽100% 内边距60px 0 */
.contact-section{padding:60px 0;background:var(--cream)}
.contact-grid{display:flex;gap:60px;max-width:1000px;margin:0 auto}
.contact-info{flex:1}
.contact-item{margin-bottom:30px}
.contact-item .label{font-size:16px;color:var(--brown);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.contact-item .value{font-size:15px;color:#666;line-height:1.8}
.contact-form{flex:1.2}
.contact-form input,.contact-form textarea{width:100%;padding:14px 16px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:15px;background:var(--white);font-family:inherit;outline:none;transition:border-color .3s}
.contact-form input:focus,.contact-form textarea:focus{border-color:var(--gold)}
.contact-form textarea{height:120px;resize:vertical}
.contact-form button{width:100%;padding:14px;background:var(--brown);color:var(--gold);border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:2px;transition:opacity .3s}
.contact-form button:hover{opacity:.9}

/* QR Code Section 尺寸：宽100% 内边距40px 0 */
.qr-section{padding:40px 0;background:var(--white);text-align:center}
.qr-code{width:180px;height:180px;background:var(--cream);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:2px solid var(--gold)}
.qr-code span{font-size:48px;opacity:.3}
.qr-text{font-size:14px;color:#888}

/* Footer 尺寸：宽100% 高约180px */
.footer{background:var(--brown);color:rgba(255,255,255,.5);padding:40px 0 20px}
.footer .container{max-width:1200px;margin:0 auto;padding:0 2rem}
.footer-brand{text-align:center;margin-bottom:20px}
.footer-brand .name{color:var(--gold);font-size:22px;font-weight:700;letter-spacing:2px;display:block}
.footer-brand .desc{color:rgba(255,255,255,.5);font-size:13px;margin-top:5px}
.footer-nav{display:flex;justify-content:center;gap:2rem;margin-bottom:20px}
.footer-nav a{color:rgba(255,255,255,.7);font-size:14px;transition:color .3s}
.footer-nav a:hover{color:var(--gold)}
.footer-copy{text-align:center;font-size:12px;opacity:.4;padding-top:15px;border-top:1px solid rgba(255,255,255,.1)}

/* Mobile */
@media(max-width:768px){
.header .container{height:50px;padding:0 1rem}
.logo{font-size:1.2rem}
.nav{gap:1rem}
.nav a{font-size:.75rem}
.page-hero{margin-top:50px;padding:40px 0}
.page-hero h1{font-size:24px}
.contact-section{padding:40px 0}
.contact-grid{flex-direction:column;gap:30px}
.qr-section{padding:30px 0}
.footer-nav{flex-wrap:wrap;gap:1rem}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
<div class="container">
<div class="logo">段位视觉锤</div>
<nav class="nav">
<a href="/">首页</a>
<a href="/cases/index.html">视觉锤案例</a>
<a href="/about.html">关于我们</a>
<a href="/contact.html">联系我们</a>
</nav>
</div>
</header>

<!-- Page Hero 尺寸：宽100% 高300px -->
<div class="page-hero">
<span class="en">Contact Us</span>
<h1>联系我们</h1>
<div class="divider"></div>
<p>让我们一起为您的品牌打造强有力的视觉锤，助力品牌在竞争中脱颖而出</p>
</div>

<!-- Contact Section 尺寸：宽100% 内边距60px 0 -->
<section class="contact-section">
<div class="container">
<div class="contact-grid">
<div class="contact-info">
<div class="contact-item">
<div class="label">📧 邮箱</div>
<div class="value">contact@duanweivh.com<br>business@duanweivh.com</div>
</div>
<div class="contact-item">
<div class="label">📱 电话</div>
<div class="value">400-888-8888<br>+86 138-0000-0000</div>
</div>
<div class="contact-item">
<div class="label">📍 地址</div>
<div class="value">中国·上海<br>上海市浦东新区XXX路XXX号</div>
</div>
<div class="contact-item">
<div class="label">🕒 工作时间</div>
<div class="value">周一至周五 9:00-18:00<br>周末及节假日休息</div>
</div>
</div>
<div class="contact-form">
<input type="text" placeholder="您的姓名 *">
<input type="email" placeholder="您的邮箱 *">

<button type="button">提交咨询</button>
</div>
</div>
</div>
</section>

<!-- QR Code Section 尺寸：宽100% 内边距40px 0 -->
<section class="qr-section">
<div class="container">
<div class="qr-code"><span></span></div>
<div class="qr-text">扫码添加微信，获取更多品牌资讯</div>
</div>
</section>

<!-- Footer 尺寸：宽100% 高约180px -->
<footer class="footer">
<div class="container">
<div class="footer-brand">
<span class="name">段位视觉锤</span>
<span class="desc">品牌视觉战略咨询专家</span>
</div>
<div class="footer-nav">
<a href="/">首页</a>
<a href="/cases/index.html">视觉锤案例</a>
<a href="/about.html">关于我们</a>
<a href="/contact.html">联系我们</a>
</div>
<div class="footer-copy">&copy; 2024 段位视觉锤 版权所有</div>
</div>
</footer>

<!-- 微信浏览器跳转提示 -->
<script>
(function(){
var ua=navigator.userAgent.toLowerCase();
if(ua.indexOf('micromessenger')!==-1){
var tip=document.createElement('div');
tip.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:40px';
tip.innerHTML='<div style="font-size:20px;margin-bottom:20px;font-weight:bold">请在浏览器中打开</div><div style="font-size:14px;opacity:.8;line-height:1.8">点击右上角菜单<br>选择"在浏览器中打开"</div><div style="margin-top:30px;font-size:12px;opacity:.5">点击任意位置关闭此提示</div>';
tip.onclick=function(){this.style.display='none'};
document.body.appendChild(tip);
}
})();
</script>

</body>
</html>
