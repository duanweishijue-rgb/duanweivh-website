<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#2C1810">
<title>联系我们 - 段位视觉锤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brown:#2C1810;--brown2:#3C2415;--brown3:#5D4037;--gold:#C5A258;--gold2:#D4AF37;--cream:#F5F0E8;--white:#fff;--gray:#f8f6f3}
body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;color:var(--brown);background:var(--white);line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 2rem}

/* Header (深咖色背景) */
.header{background:var(--white);position:fixed;width:100%;top:0;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.header .container{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;height:110px}
.logo{height:80px;width:auto}
.nav{display:flex;gap:1.5rem}
.nav a{color:var(--gold);font-size:1.35rem;padding:.5rem 0;transition:color .3s}
.nav a:hover{color:var(--gold)}

/* Hamburger Menu - 仅移动端显示 */
.hamburger{display:none;flex-direction:column;cursor:pointer;gap:5px}
.hamburger span{width:25px;height:3px;background:var(--brown);border-radius:2px;transition:all .3s}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(7px,-6px)}

/* Page Hero 尺寸：宽100% 高300px */
.page-hero{margin-top:110px;padding:60px 0;background:var(--white);text-align:center}
.page-hero .en{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:4px;margin-bottom:10px;display:block}
.page-hero h1{font-size:32px;color:var(--brown);font-weight:700;letter-spacing:2px;margin-bottom:15px}
.page-hero .divider{width:40px;height:2px;background:var(--gold);margin:0 auto 20px}
.page-hero p{font-size:15px;color:#888;max-width:600px;margin:0 auto;line-height:1.8}

/* Contact Section 尺寸：宽100% 内边距60px 0 */
.contact-section{padding:60px 0;background:var(--white)}
.contact-grid{display:flex;gap:60px;max-width:1000px;margin:0 auto}
.contact-info{flex:1}
.contact-item{margin-bottom:30px}
.contact-item .label{font-size:16px;color:var(--brown);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.contact-item .value{font-size:15px;color:#666;line-height:1.8}
.contact-form{flex:1.2}
.contact-form input,.contact-form textarea{width:100%;padding:14px 16px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:15px;background:var(--white);font-family:inherit;outline:none;transition:border-color .3s}
.contact-form input:focus,.contact-form textarea:focus{border-color:var(--gold)}
.contact-form textarea{height:120px;resize:vertical}
.contact-form button{width:100%;padding:14px;background:var(--brown);color:var(--gold);border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:2px;transition:opacity .3s}
.contact-form button:hover{opacity:.9}

/* QR Code Section 尺寸：宽100% 内边距40px 0 */
.qr-section{padding:40px 0;background:var(--white);text-align:center}
.qr-code{width:180px;height:180px;background:var(--cream);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:2px solid var(--gold)}
.qr-code span{font-size:48px;opacity:.3}
.qr-text{font-size:14px;color:#888}

/* Footer 尺寸：宽100% 高约180px */
.footer{background:var(--brown);color:rgba(255,255,255,.5);padding:60px 0 30px}
.footer .container{max-width:1200px;margin:0 auto;padding:0 2rem}
.footer-brand{text-align:center;margin-bottom:30px}
.footer-brand .name{color:var(--gold);font-size:33px;font-weight:700;letter-spacing:2px;display:block}
.footer-brand .desc{color:rgba(255,255,255,.5);font-size:19.5px;margin-top:7.5px}
.footer-nav{display:flex;justify-content:center;gap:2rem;margin-bottom:30px}
.footer-nav a{color:rgba(255,255,255,.7);font-size:21px;transition:color .3s}
.footer-nav a:hover{color:var(--gold)}
.footer-copy{text-align:center;font-size:18px;opacity:.4;padding-top:22.5px;border-top:1px solid rgba(255,255,255,.1)}

/* Mobile */
@media(max-width:768px){
.container{max-width:100%;padding:0 1rem}
.header .container{max-width:100%;height:80px;padding:0 1rem}
.logo{height:55px;width:auto}
.nav{position:fixed;top:80px;left:-100%;width:100%;height:calc(100vh - 80px);background:var(--brown);flex-direction:column;align-items:center;justify-content:flex-start;padding-top:40px;gap:2rem;transition:left .3s ease}
.nav.active{left:0}
.nav a{font-size:1.2rem;color:var(--white);padding:1rem 2rem;border-bottom:1px solid rgba(255,255,255,.1);width:100%;text-align:center}
.hamburger{display:flex}
.page-hero{padding:50px 1rem}
.page-hero h1{font-size:28px;letter-spacing:2px;line-height:1.4}
.page-hero p{font-size:15px;line-height:1.8}
.contact-grid{flex-direction:column;gap:40px}
.footer-nav{flex-wrap:wrap;gap:1.5rem}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
<div class="container">
<img class="logo" src="./images/logo/logo.jpg" alt="段位超级视觉">

<span></span>

<!-- Footer 尺寸：宽100% 高约180px -->

<div class="footer-nav">
<a href="./">首页</a>

</div>
</footer>

<!-- 微信浏览器跳转提示 -->


<script>
// Hamburger Menu
document.getElementById('hamburger').addEventListener('click',function(){
  this.classList.toggle('active');
  document.getElementById('nav').classList.toggle('active');
});

// Close menu when clicking a link
document.querySelectorAll('.nav a').forEach(function(link){
  link.addEventListener('click',function(){
    document.getElementById('hamburger').classList.remove('active');
    document.getElementById('nav').classList.remove('active');
  });
});
</script>

</body>
</html>
